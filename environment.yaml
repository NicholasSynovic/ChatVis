# Minimal conda env whose only purpose is to put `pvpython` on $PATH.
#
# This is an alternative for users without a system ParaView install; it
# does NOT replace the uv-managed Python 3.14 toolchain that runs the
# package itself (see pyproject.toml / .python-version). Once this env is
# active, run the package via `uv run ...` as usual; conda only provides
# the `pvpython` binary that the orchestrator shells out to.
#
# Usage:
#   conda env create -f environment.yaml
#   conda activate chatvis
#   which pvpython     # should print a path inside the env
#   uv run python -m chatvis.main --help
#
# ParaView version: pinned to 5.13.3 because the v1 code snippets and
# benchmark scripts were authored against that release. Bump only after
# re-validating against `data/benchmark/`.
name: chatvis
channels:
    - conda-forge
    - nodefaults
dependencies:
    - paraview=5.13.3
